	       /* transform: rotate(-90deg) translate(+27.5,2); */
	       transform: rotate(-90deg) translate(+11,2); /* +27.5,2 */
	   }
	   text.tag_dn {
	       /* transform: rotate(-90deg) translate(-27.5,2); */
	       transform: rotate(-90deg) translate(-40,2);
	   }
    ]]>
